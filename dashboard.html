<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハイブリッド家計簿 - 分析ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background-color: #0d0e12;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 30px;
    }
    .header {
      border-bottom: 2px solid #00ff66;
      padding-bottom: 15px;
      margin-bottom: 30px;
    }
    h1 {
      color: #00ff66;
      margin: 0;
      font-size: 28px;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
      letter-spacing: 1px;
    }
    .summary-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: #161822;
      border: 1px solid #252838;
      border-radius: 8px;
      padding: 20px;
      flex: 1;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .card h3 { color: #888; margin: 0 0 10px 0; font-size: 14px; }
    .card .value { color: #fff; font-size: 32px; font-weight: bold; }
    .card .value.neon { color: #00ff66; text-shadow: 0 0 8px rgba(0, 255, 102, 0.3); }
    .charts-grid {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .chart-box {
      background: #161822;
      border: 1px solid #252838;
      border-radius: 8px;
      padding: 20px;
      flex: 1;
      height: 340px;
    }
    .chart-box h2 { color: #00ff66; font-size: 18px; margin-top: 0; margin-bottom: 20px; }
    .table-box {
      background: #161822;
      border: 1px solid #252838;
      border-radius: 8px;
      padding: 20px;
    }
    .table-box h2 { color: #00ff66; font-size: 18px; margin-top: 0; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { border-bottom: 2px solid #252838; padding: 12px; color: #00ff66; font-size: 14px; }
    td { padding: 12px; border-bottom: 1px solid #1f2230; font-size: 14px; color: #ccc; }
    tr:hover td { background: #1c1f2d; color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <h1> CYBER KAKEIBO DASHBOARD</h1>
  </div>
  <div class="summary-container">
    <div class="card">
      <h3>今月の総支出</h3>
      <div class="value neon" id="totalExpense">¥0</div>
    </div>
    <div class="card">
      <h3>データ同期ステータス</h3>
      <div class="value" style="color: #00bfff;">ONLINE</div>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-box">
      <h2>■ 支払い方法別支出</h2>
      <canvas id="methodChart"></canvas>
    </div>
    <div class="chart-box">
      <h2>■ カテゴリ別支出</h2>
      <canvas id="categoryChart"></canvas>
    </div>
  </div>
  <div class="table-box">
    <h2>■ 直近の明細履歴 (リアルタイム同期)</h2>
    <table>
      <thead>
        <tr>
          <th>日時</th>
          <th>カテゴリ</th>
          <th>支払い方法</th>
          <th>メモ</th>
          <th style="text-align: right;">金額</th>
        </tr>
      </thead>
      <tbody id="transactionRows">
        </tbody>
    </table>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
    // ⚠️ ここは星翔の本当の config に書き換えてね！ ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Chartの初期化インスタンス保持用
    let methodChartObj = null;
    let categoryChartObj = null;
    
    // ネオンカラーパレットの定義
    const neonColors = ['#00ff66', '#00bfff', '#ff00ff', '#ffaa00', '#ff0033', '#9933ff', '#ccff00'];
    
    // Firestoreからリアルタイムでデータを監視・取得
    const q = query(collection(db, "transactions"), orderBy("date", "desc"));
    onSnapshot(q, (snapshot) => {
      let total = 0;
      const methodsData = {};
      const categoriesData = {};
      let tableHtml = "";
      
      snapshot.forEach((doc) => {
        const data = doc.data();
        const amount = data.amount || 0;
        total += amount;
        
        // 支払い方法の集計
        methodsData[data.paymentMethod] = (methodsData[data.paymentMethod] || 0) + amount;
        // カテゴリの集計
        categoriesData[data.category] = (categoriesData[data.category] || 0) + amount;
        
        // テーブル行の生成
        const dateObj = data.date ? data.date.toDate() : new Date();
        const dateString = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
        
        tableHtml += `<tr>
          <td>${dateString}</td>
          <td>${data.category}</td>
          <td><span style="color:#00bfff;">${data.paymentMethod}</span></td>
          <td>${data.memo || '-'}</td>
          <td style="text-align: right; color:#00ff66; font-weight:bold;">¥${amount.toLocaleString()}</td>
        </tr>`;
      });
      
      // UIの更新
      document.getElementById("totalExpense").innerText = `¥${total.toLocaleString()}`;
      document.getElementById("transactionRows").innerHTML = tableHtml;
      
      // グラフの更新処理
      updateCharts(methodsData, categoriesData);
    });
    
    function updateCharts(methods, categories) {
      const ctxMethod = document.getElementById('methodChart').getContext('2d');
      const ctxCategory = document.getElementById('categoryChart').getContext('2d');
      
      // 1. 支払い方法チャート (Doughnut)
      if (methodChartObj) methodChartObj.destroy();
      methodChartObj = new Chart(ctxMethod, {
        type: 'doughnut',
        data: {
          labels: Object.keys(methods),
          datasets: [{
            data: Object.values(methods),
            backgroundColor: neonColors,
            borderWidth: 1,
            borderColor: '#161822'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#aaa' } } }
        }
      });
      
      // 2. カテゴリチャート (Bar)
      if (categoryChartObj) categoryChartObj.destroy();
      categoryChartObj = new Chart(ctxCategory, {
        type: 'bar',
        data: {
          labels: Object.keys(categories),
          datasets: [{
            label: '支出額',
            data: Object.values(categories),
            backgroundColor: '#00ff66',
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { grid: { color: '#252838' }, ticks: { color: '#aaa' } },
            y: { grid: { color: '#252838' }, ticks: { color: '#aaa' } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }
  </script>
</body>
</html>

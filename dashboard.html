<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハイブリッド家計簿 - 分析ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #0d0e12; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* 1️⃣ 最初の認証画面（ログイン/新規登録） */
    #authScreen {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; background-color: #0d0e12;
    }
    #loginFormContainer {
      background: #161822; border: 2px solid #00ff66; border-radius: 8px;
      padding: 30px; width: 320px; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
    }
    #loginFormContainer h3 { color: #00ff66; margin-top: 0; text-align: center; font-size: 20px; letter-spacing: 1px; }
    #loginFormContainer label { display: block; margin-top: 15px; font-size: 12px; color: #888; }
    #loginFormContainer input { width: 100%; padding: 10px; margin-top: 5px; background: #0d0e12; border: 1px solid #252838; color: #fff; border-radius: 4px; box-sizing: border-box; }
    #loginFormContainer input:focus { border-color: #00ff66; outline: none; }
    .cyber-btn { width: 100%; padding: 12px; margin-top: 25px; background: #00ff66; color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .cyber-btn:hover { background: #00cc52; }
    .toggle-text { text-align: center; font-size: 12px; margin-top: 15px; color: #00bfff; cursor: pointer; }

    /* 2️⃣ 隠しコマンド待機画面 */
    #lockScreen {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #000; z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center;
      color: #00ff66; font-family: 'Courier New', Courier, monospace;
    }
    .blink { animation: blinker 1s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    /* 3️⃣ ダッシュボード本体 */
    #dashboardContent { display: none; padding: 30px; }
    .header { border-bottom: 2px solid #00ff66; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
    h1 { color: #00ff66; margin: 0; font-size: 24px; text-shadow: 0 0 10px rgba(0, 255, 102, 0.5); }
    .summary-container { display: flex; gap: 20px; margin-bottom: 30px; }
    .card { background: #161822; border: 1px solid #252838; border-radius: 8px; padding: 20px; flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .card h3 { color: #888; margin: 0 0 10px 0; font-size: 14px; }
    .card .value { color: #fff; font-size: 32px; font-weight: bold; }
    .card .value.neon { color: #00ff66; text-shadow: 0 0 8px rgba(0, 255, 102, 0.3); }
    .charts-grid { display: flex; gap: 20px; margin-bottom: 30px; }
    .chart-box { background: #161822; border: 1px solid #252838; border-radius: 8px; padding: 20px; flex: 1; height: 340px; }
    .chart-box h2 { color: #00ff66; font-size: 18px; margin-top: 0; margin-bottom: 20px; }
    .table-box { background: #161822; border: 1px solid #252838; border-radius: 8px; padding: 20px; }
    .table-box h2 { color: #00ff66; font-size: 18px; margin-top: 0; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { border-bottom: 2px solid #252838; padding: 12px; color: #00ff66; font-size: 14px; }
    td { padding: 12px; border-bottom: 1px solid #1f2230; font-size: 14px; color: #ccc; }
    tr:hover td { background: #1c1f2d; color: #fff; }
  </style>
</head>
<body>

  <div id="authScreen">
    <div id="loginFormContainer">
      <h3 id="formTitle">⚡ システムログイン</h3>
      <label>メールアドレス</label>
      <input type="email" id="pcEmail">
      <label>パスワード</label>
      <input type="password" id="pcPassword">
      <button class="cyber-btn" id="pcAuthBtn">ログイン</button>
      <div class="toggle-text" id="pcAuthToggle">新規登録はこちら</div>
    </div>
  </div>

  <div id="lockScreen">
    <h2 style="margin-bottom: 5px;">認証完了</h2>
    <p style="color: #666; font-size: 14px;">開発者コマンド待機中<span class="blink">_</span></p>
  </div>

  <div id="dashboardContent">
    <div class="header">
      <h1>⚡ サイバー家計簿ダッシュボード</h1>
      <div style="text-align: right;">
        <span id="userNameDisplay" style="color: #888; font-size: 14px; margin-right: 15px;"></span>
        <span id="pcLogout" style="color: #ff0033; font-size: 12px; cursor: pointer; font-weight: bold;">[ ログアウト ]</span>
      </div>
    </div>
    <div class="summary-container">
      <div class="card"><h3>今月の総支出</h3><div class="value neon" id="totalExpense">¥0</div></div>
      <div class="card"><h3>システム状態</h3><div class="value" style="color: #00bfff;">オンライン接続済み</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-box"><h2>■ 支払い方法別支出</h2><canvas id="methodChart"></canvas></div>
      <div class="chart-box"><h2>■ カテゴリ別支出</h2><canvas id="categoryChart"></canvas></div>
    </div>
    <div class="table-box">
      <h2>■ 直近の明細履歴 (リアルタイム同期)</h2>
      <table>
        <thead><tr><th>日時</th><th>カテゴリ</th><th>支払い方法</th><th>メモ</th><th style="text-align: right;">金額</th></tr></thead>
        <tbody id="transactionRows"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⚠️ ここは本物の config に書き換えてね！ ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let methodChartObj = null; let categoryChartObj = null;
    const neonColors = ['#00ff66', '#00bfff', '#ff00ff', '#ffaa00', '#ff0033', '#9933ff', '#ccff00'];
    let unsubscribe = null;
    let isPcSignUpMode = false;
    let isAwaitingCommand = false;

    // モード切り替え
    document.getElementById('pcAuthToggle').addEventListener('click', () => {
      isPcSignUpMode = !isPcSignUpMode;
      if (isPcSignUpMode) {
        document.getElementById('formTitle').innerText = "📝 新規アカウント登録";
        document.getElementById('pcAuthBtn').innerText = "登録する";
        document.getElementById('pcAuthToggle').innerText = "ログイン画面へ戻る";
      } else {
        document.getElementById('formTitle').innerText = "⚡ システムログイン";
        document.getElementById('pcAuthBtn').innerText = "ログイン";
        document.getElementById('pcAuthToggle').innerText = "新規登録はこちら";
      }
    });

    // 認証ボタンの処理
    document.getElementById('pcAuthBtn').addEventListener('click', async () => {
      const email = document.getElementById('pcEmail').value;
      const password = document.getElementById('pcPassword').value;
      
      try {
        await setPersistence(auth, browserSessionPersistence);
        if (isPcSignUpMode) {
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        alert(`エラー: ${error.message}`);
      }
    });

    // ログイン状態の監視
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // ログイン成功！ フォームを消して、コマンド待機画面を出す
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('lockScreen').style.display = 'flex';
        document.getElementById('dashboardContent').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = `ログイン中: ${user.email}`;
        
        isAwaitingCommand = true;
      } else {
        // ログアウト状態： フォームだけを見せる
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'none';
        isAwaitingCommand = false;
        if (unsubscribe) unsubscribe();
      }
    });

    // 💡 ショートカットキー (Ctrl + Shift + Enter) でダッシュボード展開！
    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'Enter') {
        if (isAwaitingCommand) {
          console.log("コマンド受付完了。ダッシュボードを起動します...");
          
          document.getElementById('lockScreen').style.display = 'none';
          document.getElementById('dashboardContent').style.display = 'block';
          
          startDataSync();
          isAwaitingCommand = false;
        }
      }
    });

    // ログアウト
    document.getElementById('pcLogout').addEventListener('click', () => { signOut(auth); });

    // データ同期とグラフ描画処理
    function startDataSync() {
      const q = query(collection(db, "transactions"), orderBy("date", "desc"));
      unsubscribe = onSnapshot(q, (snapshot) => {
        let total = 0; const methodsData = {}; const categoriesData = {}; let tableHtml = "";
        snapshot.forEach((doc) => {
          const data = doc.data(); const amount = data.amount || 0; total += amount;
          methodsData[data.paymentMethod] = (methodsData[data.paymentMethod] || 0) + amount;
          categoriesData[data.category] = (categoriesData[data.category] || 0) + amount;
          const dateObj = data.date ? data.date.toDate() : new Date();
          const dateString = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
          tableHtml += `<tr><td>${dateString}</td><td>${data.category}</td><td><span style="color:#00bfff;">${data.paymentMethod}</span></td><td>${data.memo || '-'}</td><td style="text-align: right; color:#00ff66; font-weight:bold;">¥${amount.toLocaleString()}</td></tr>`;
        });
        document.getElementById("totalExpense").innerText = `¥${total.toLocaleString()}`;
        document.getElementById("transactionRows").innerHTML = tableHtml;
        updateCharts(methodsData, categoriesData);
      });
    }

    function updateCharts(methods, categories) {
      const ctxMethod = document.getElementById('methodChart').getContext('2d');
      const ctxCategory = document.getElementById('categoryChart').getContext('2d');
      if (methodChartObj) methodChartObj.destroy();
      methodChartObj = new Chart(ctxMethod, { type: 'doughnut', data: { labels: Object.keys(methods), datasets: [{ data: Object.values(methods), backgroundColor: neonColors, borderWidth: 1, borderColor: '#161822' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#aaa' } } } } });
      if (categoryChartObj) categoryChartObj.destroy();
      categoryChartObj = new Chart(ctxCategory, { type: 'bar', data: { labels: Object.keys(categories), datasets: [{ label: '支出額', data: Object.values(categories), backgroundColor: '#00ff66', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: '#252838' }, ticks: { color: '#aaa' } }, y: { grid: { color: '#252838' }, ticks: { color: '#aaa' } } }, plugins: { legend: { display: false } } } });
    }
  </script>
</body>
</html>

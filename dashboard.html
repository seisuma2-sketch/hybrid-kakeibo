<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハイブリッド家計簿 - 分析ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #0d0e12; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* 1️⃣ ログイン＆新規登録画面 */
    #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0d0e12; z-index: 10000; }
    #loginFormContainer { background: #161822; border: 2px solid #00ff66; border-radius: 8px; padding: 30px; width: 320px; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); }
    #loginFormContainer h3 { color: #00ff66; margin-top: 0; text-align: center; font-size: 20px; letter-spacing: 1px; }
    #loginFormContainer label { display: block; margin-top: 15px; font-size: 12px; color: #888; }
    #loginFormContainer input { width: 100%; padding: 10px; margin-top: 5px; background: #0d0e12; border: 1px solid #252838; color: #fff; border-radius: 4px; box-sizing: border-box; }
    #loginFormContainer input:focus { border-color: #00ff66; outline: none; }
    .cyber-btn { width: 100%; padding: 12px; margin-top: 25px; background: #00ff66; color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .cyber-btn:hover { background: #00cc52; }
    .toggle-text { text-align: center; font-size: 12px; margin-top: 15px; color: #00bfff; cursor: pointer; }

    /* 2️⃣ ダッシュボード全体レイアウト (サイドバー + メイン) */
    #dashboardContent { display: none; width: 100vw; height: 100vh; flex-direction: row; }
    
    /* サイドバー */
    .sidebar { width: 250px; background: #161822; border-right: 1px solid #252838; display: flex; flex-direction: column; padding-top: 20px; }
    .sidebar-title { color: #00ff66; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 30px; letter-spacing: 1px; text-shadow: 0 0 8px rgba(0, 255, 102, 0.4); }
    .nav-item { padding: 15px 20px; color: #888; cursor: pointer; font-size: 15px; border-left: 4px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { background: #1c1f2d; color: #e0e0e0; }
    .nav-item.active { background: #1a231f; color: #00ff66; border-left: 4px solid #00ff66; font-weight: bold; }
    .sidebar-footer { margin-top: auto; padding: 20px; font-size: 12px; color: #555; text-align: center; }
    
    /* メインコンテンツエリア */
    .main-area { flex: 1; padding: 40px; overflow-y: auto; background-color: #0d0e12; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid #252838; padding-bottom: 15px; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; font-weight: normal; }
    
    /* タブ切り替え用のクラス */
    .tab-pane { display: none; animation: fadeIn 0.3s ease; }
    .tab-pane.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 各種カード・グラフのスタイル */
    .card { background: #161822; border: 1px solid #252838; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    
    /* 超巨大な総支出表示用 */
    .huge-value-box { text-align: center; padding: 40px 0; }
    .huge-value-box h3 { color: #888; margin: 0 0 10px 0; font-size: 18px; font-weight: normal; }
    .huge-value-box .value { color: #00ff66; font-size: 80px; font-weight: bold; text-shadow: 0 0 20px rgba(0, 255, 102, 0.4); line-height: 1; margin: 0; font-family: 'Courier New', Courier, monospace; }
    
    .chart-container { height: 400px; width: 100%; }
    .chart-box-title { color: #00ff66; font-size: 16px; margin-top: 0; margin-bottom: 20px; }
    
    /* テーブルスタイル */
    table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
    th { border-bottom: 2px solid #252838; padding: 12px; color: #888; font-size: 13px; font-weight: normal; }
    td { padding: 12px; border-bottom: 1px solid #1f2230; font-size: 14px; color: #ccc; }
    tr:hover td { background: #1c1f2d; color: #fff; }
    
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  </style>
</head>
<body>

  <div id="authScreen">
    <div id="loginFormContainer">
      <h3 id="formTitle">⚡ システムログイン</h3>
      <label>メールアドレス</label>
      <input type="email" id="pcEmail">
      <label>パスワード</label>
      <input type="password" id="pcPassword">
      <button class="cyber-btn" id="pcAuthBtn">ログイン実行</button>
      <div class="toggle-text" id="pcAuthToggle">新規登録モードへ切り替え</div>
    </div>
  </div>

  <div id="dashboardContent">
    
    <div class="sidebar">
      <div class="sidebar-title">家計簿</div>
      <div class="nav-item active" onclick="switchTab('tab-home', this)">🏠 ホーム</div>
      <div class="nav-item" onclick="switchTab('tab-trend', this)">📈 支出トレンド</div>
      <div class="nav-item" onclick="switchTab('tab-payment', this)">💳 支払い方法別</div>
      <div class="nav-item" onclick="switchTab('tab-category', this)">🏷️ 用途・カテゴリ別</div>
      
      <div class="sidebar-footer">
        <span id="userNameDisplay" style="display: block; margin-bottom: 10px;"></span>
        <span id="pcLogout" style="color: #ff0033; cursor: pointer; font-weight: bold; text-decoration: underline;">[ ログアウト ]</span>
      </div>
    </div>

    <div class="main-area">
      <div class="header">
        <h1 id="pageTitle">ホーム</h1>
        <div style="color: #00bfff; font-size: 12px;">● SECURE ONLINE</div>
      </div>

      <div id="tab-home" class="tab-pane active">
        <div class="card huge-value-box">
          <h3>今月の総支出</h3>
          <div class="value" id="totalExpenseHuge">¥0</div>
        </div>
        <div class="card">
          <h2 class="chart-box-title">■ 直近の明細履歴</h2>
          <table>
            <thead><tr><th>日時</th><th>カテゴリ</th><th>支払い方法</th><th>メモ</th><th style="text-align: right;">金額</th></tr></thead>
            <tbody id="transactionRows"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-trend" class="tab-pane">
        <div class="card">
          <h2 class="chart-box-title">■ 日別支出推移 (今月)</h2>
          <div class="chart-container">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
      </div>

      <div id="tab-payment" class="tab-pane">
        <div class="grid-2col">
          <div class="card">
            <h2 class="chart-box-title">■ 支払い方法の比率</h2>
            <div class="chart-container" style="height: 300px;">
              <canvas id="methodChart"></canvas>
            </div>
          </div>
          <div class="card">
            <h2 class="chart-box-title">■ 支払い方法別 合計金額</h2>
            <table>
              <thead><tr><th>決済手段</th><th style="text-align: right;">合計金額</th></tr></thead>
              <tbody id="methodTableRows"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="tab-category" class="tab-pane">
        <div class="card">
          <h2 class="chart-box-title">■ カテゴリ別 支出バランス</h2>
          <div class="chart-container" style="height: 300px;">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
        <div class="card">
          <h2 class="chart-box-title">■ カテゴリ別 合計金額</h2>
          <table>
            <thead><tr><th>カテゴリ名</th><th style="text-align: right;">合計金額</th></tr></thead>
            <tbody id="categoryTableRows"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⚠️① ここは本物の config に書き換えてね！
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    // ⚠️② 開発者（星翔）の秘密の裏口キー設定！
    const DEV_EMAIL = "seisuma2@gmail.com"; 
    const DEV_PASSWORD = "Seisuma2";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // チャートのインスタンス変数
    let methodChartObj = null; let categoryChartObj = null; let trendChartObj = null;
    const neonColors = ['#00ff66', '#00bfff', '#ff00ff', '#ffaa00', '#ff0033', '#9933ff', '#ccff00'];
    let unsubscribe = null;
    let isPcSignUpMode = false;

    // タブ切り替え関数 (グローバルに登録)
    window.switchTab = function(tabId, element) {
      // 全タブを隠す
      document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
      // 選択したタブを表示
      document.getElementById(tabId).classList.add('active');
      
      // サイドバーのアクティブ状態を変更
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      // ページタイトルの変更
      const titles = {
        'tab-home': 'ホーム ',
        'tab-trend': '収支',
        'tab-payment': '支払い方法別合計金額',
        'tab-category': '用途'
      };
      document.getElementById('pageTitle').innerText = titles[tabId];
    };

    // モード切り替え
    document.getElementById('pcAuthToggle').addEventListener('click', () => {
      isPcSignUpMode = !isPcSignUpMode;
      document.getElementById('formTitle').innerText = isPcSignUpMode ? "📝 新規アカウント登録" : "⚡ システムログイン";
      document.getElementById('pcAuthBtn').innerText = isPcSignUpMode ? "登録実行" : "ログイン実行";
      document.getElementById('pcAuthToggle').innerText = isPcSignUpMode ? "ログイン画面へ戻る" : "新規登録モードへ切り替え";
    });

    // 一般ユーザーログイン
    document.getElementById('pcAuthBtn').addEventListener('click', async () => {
      const email = document.getElementById('pcEmail').value;
      const password = document.getElementById('pcPassword').value;
      try {
        await setPersistence(auth, browserSessionPersistence);
        if (isPcSignUpMode) { await createUserWithEmailAndPassword(auth, email, password); } 
        else { await signInWithEmailAndPassword(auth, email, password); }
      } catch (error) { alert(`エラー: ${error.message}`); }
    });

    // 💡 開発者専用：隠しコマンド (Ctrl + Shift + Enter)
    window.addEventListener('keydown', async (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'Enter') {
        try {
          await setPersistence(auth, browserSessionPersistence);
          await signInWithEmailAndPassword(auth, DEV_EMAIL, DEV_PASSWORD);
        } catch (error) { alert("裏口ログイン失敗。メールとパスワードを確認してね。"); }
      }
    });

    // ログイン監視
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = `ID: ${user.email}`;
        startDataSync(user.uid);
      } else {
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('dashboardContent').style.display = 'none';
        if (unsubscribe) unsubscribe();
      }
    });

    document.getElementById('pcLogout').addEventListener('click', () => { signOut(auth); });

    // データ同期処理
    function startDataSync(uid) {
      const q = query(collection(db, "transactions"), where("userId", "==", uid));
      
      unsubscribe = onSnapshot(q, (snapshot) => {
        let total = 0; 
        const methodsData = {}; 
        const categoriesData = {}; 
        const dailyData = {}; // 日別推移用
        let tableHtml = "";

        const docs = snapshot.docs.map(doc => doc.data());
        docs.sort((a, b) => {
          const timeA = a.date ? a.date.toMillis() : 0;
          const timeB = b.date ? b.date.toMillis() : 0;
          return timeB - timeA;
        });

        docs.forEach((data) => {
          const amount = data.amount || 0; 
          total += amount;
          
          methodsData[data.paymentMethod] = (methodsData[data.paymentMethod] || 0) + amount;
          categoriesData[data.category] = (categoriesData[data.category] || 0) + amount;
          
          // 日別データの集計 (例: "7/7" という形式で集計)
          const dateObj = data.date ? data.date.toDate() : new Date();
          const dayKey = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
          dailyData[dayKey] = (dailyData[dayKey] || 0) + amount;

          // 直近履歴テーブル生成
          const dateString = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
          tableHtml += `<tr><td>${dateString}</td><td>${data.category}</td><td><span style="color:#00bfff;">${data.paymentMethod}</span></td><td>${data.memo || '-'}</td><td style="text-align: right; color:#00ff66; font-weight:bold;">¥${amount.toLocaleString()}</td></tr>`;
        });
        
        // ホーム画面の巨大総支出
        document.getElementById("totalExpenseHuge").innerText = `¥${total.toLocaleString()}`;
        document.getElementById("transactionRows").innerHTML = tableHtml;

        // 支払い方法テーブル生成
        let methodHtml = "";
        Object.keys(methodsData).sort((a,b) => methodsData[b] - methodsData[a]).forEach(key => {
          methodHtml += `<tr><td>${key}</td><td style="text-align: right; color:#00ff66;">¥${methodsData[key].toLocaleString()}</td></tr>`;
        });
        document.getElementById("methodTableRows").innerHTML = methodHtml;

        // カテゴリテーブル生成
        let catHtml = "";
        Object.keys(categoriesData).sort((a,b) => categoriesData[b] - categoriesData[a]).forEach(key => {
          catHtml += `<tr><td>${key}</td><td style="text-align: right; color:#00ff66;">¥${categoriesData[key].toLocaleString()}</td></tr>`;
        });
        document.getElementById("categoryTableRows").innerHTML = catHtml;

        // グラフ更新
        updateCharts(methodsData, categoriesData, dailyData);
      });
    }

    function updateCharts(methods, categories, daily) {
      // 共通のグラフ設定
      const commonOptions = { responsive: true, maintainAspectRatio: false, color: '#888' };

      // 1. 支払い方法 (Doughnut)
      const ctxMethod = document.getElementById('methodChart').getContext('2d');
      if (methodChartObj) methodChartObj.destroy();
      methodChartObj = new Chart(ctxMethod, { 
        type: 'doughnut', 
        data: { labels: Object.keys(methods), datasets: [{ data: Object.values(methods), backgroundColor: neonColors, borderWidth: 2, borderColor: '#161822' }] }, 
        options: { ...commonOptions, plugins: { legend: { position: 'right', labels: { color: '#ccc' } } } } 
      });

      // 2. カテゴリ (Bar)
      const ctxCategory = document.getElementById('categoryChart').getContext('2d');
      if (categoryChartObj) categoryChartObj.destroy();
      categoryChartObj = new Chart(ctxCategory, { 
        type: 'bar', 
        data: { labels: Object.keys(categories), datasets: [{ label: '支出額', data: Object.values(categories), backgroundColor: '#00ff66', borderRadius: 4 }] }, 
        options: { ...commonOptions, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#252838' }, ticks: { color: '#aaa' } }, y: { grid: { color: '#252838' }, ticks: { color: '#aaa' } } } } 
      });

      // 3. 支出トレンド (Line) - 日付の古い順にソートして表示
      const sortedDays = Object.keys(daily).sort((a, b) => {
        const [mA, dA] = a.split('/').map(Number); const [mB, dB] = b.split('/').map(Number);
        return mA !== mB ? mA - mB : dA - dB;
      });
      const trendData = sortedDays.map(day => daily[day]);

      const ctxTrend = document.getElementById('trendChart').getContext('2d');
      if (trendChartObj) trendChartObj.destroy();
      trendChartObj = new Chart(ctxTrend, {
        type: 'line',
        data: { labels: sortedDays, datasets: [{ label: '日別支出', data: trendData, borderColor: '#00bfff', backgroundColor: 'rgba(0, 191, 255, 0.2)', borderWidth: 3, fill: true, tension: 0.4, pointBackgroundColor: '#fff', pointBorderColor: '#00bfff', pointRadius: 5 }] },
        options: { ...commonOptions, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#252838' }, ticks: { color: '#aaa' } }, y: { beginAtZero: true, grid: { color: '#252838' }, ticks: { color: '#aaa' } } } }
      });
    }
  </script>
</body>
</html>

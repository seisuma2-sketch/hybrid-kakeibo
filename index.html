<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハイブリッド家計簿</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    #submitBtn { background-color: #007bff; color: white; }
    #submitBtn:active { background-color: #0056b3; }
    /* ログインボタン用のおしゃれなデザイン */
    #loginBtn { background-color: #ffffff; color: #757575; border: 1px solid #ddd; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    #message { text-align: center; margin-top: 15px; color: green; font-weight: bold; display: none; }
  </style>
</head>
<body>

  <div class="container" id="loginScreen" style="display: none; text-align: center; padding-top: 40px; padding-bottom: 40px;">
    <h2>🔒 家計簿システム</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 30px;">利用するにはログインしてね</p>
    <button id="loginBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
  </div>

  <div class="container" id="mainForm" style="display: none;">
    <h2>💸 支出入力</h2>
    <p id="userGreeting" style="text-align: center; color: #888; font-size: 12px; margin-top: -15px;"></p>
    
    <label>金額</label>
    <input type="number" id="amount" placeholder="例: 150" required>

    <label>カテゴリ</label>
    <select id="category">
      <option value="食費">食費</option>
      <option value="日用品">日用品</option>
      <option value="交通費">交通費</option>
      <option value="娯楽">娯楽</option>
      <option value="その他">その他</option>
    </select>

    <label>支払い方法</label>
    <select id="paymentMethod">
      <option value="現金">現金</option>
      <option value="EVERING">EVERING</option>
      <option value="クレジットカード">クレジットカード</option>
      <option value="郵カード">郵カード</option>
      <option value="Uカード">Uカード</option>
      <option value="住カード">住カード</option>
      <option value="ぺいぺい">ぺいぺい</option>
    </select>

    <label>メモ (任意)</label>
    <input type="text" id="memo" placeholder="例: コンビニコーヒー">

    <button id="submitBtn">記録する</button>
    <p id="message">保存しました！</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    // 💡 認証用の機能を新しく追加したよ！
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⚠️ ここは星翔の本当の config に書き換えてね！ ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 💡 これが「ずっとログイン」を実現する魔法のコード！
    // 画面を開いた瞬間、ログインしているかチェックする
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // ログインしていたら、ログイン画面を隠して入力フォームを表示する
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainForm").style.display = "block";
        document.getElementById("userGreeting").innerText = `${user.displayName}さん、こんにちは！`;
      } else {
        // ログインしていなかったら、ログイン画面を表示する
        document.getElementById("loginScreen").style.display = "block";
        document.getElementById("mainForm").style.display = "none";
      }
    });

    // ログインボタンを押したときの処理
    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("ログインエラー: ", error);
        alert("ログインに失敗しました。");
      }
    });

    // 送信ボタンの処理
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const paymentMethod = document.getElementById("paymentMethod").value;
      const memo = document.getElementById("memo").value;

      if (!amount) { alert("金額を入力してね！"); return; }

      try {
        await addDoc(collection(db, "transactions"), {
          amount: Number(amount),
          category: category,
          type: "expense",
          paymentMethod: paymentMethod,
          memo: memo,
          date: new Date(),
          // 誰が入力したかのデータも一緒に保存するよ
          userId: auth.currentUser.uid 
        });

        document.getElementById("message").style.display = "block";
        document.getElementById("amount").value = "";
        document.getElementById("memo").value = "";
        setTimeout(() => { document.getElementById("message").style.display = "none"; }, 3000);

      } catch (error) {
        console.error("エラーが起きたよ: ", error);
        alert("保存に失敗しちゃった。コンソールを確認してね。");
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハイブリッド家計簿</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 14px; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
    .btn-primary { background-color: #007bff; color: white; }
    .btn-primary:active { background-color: #0056b3; }
    .btn-success { background-color: #28a745; color: white; padding: 10px 15px; font-size: 14px; width: auto; margin-top: 5px; white-space: nowrap; }
    .btn-google { background-color: #ffffff; color: #757575; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
    .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #007bff; cursor: pointer; }
    #message { text-align: center; margin-top: 15px; color: green; font-weight: bold; display: none; }
    .flex-row { display: flex; gap: 10px; align-items: center; }
  </style>
</head>
<body>

  <div class="container" id="authScreen" style="display: none;">
    <h2 id="authTitle">🔒 家計簿ログイン</h2>
    <label>メールアドレス</label>
    <input type="email" id="authEmail" placeholder="example@gmail.com">
    <label>パスワード</label>
    <input type="password" id="authPassword" placeholder="6文字以上">
    <button id="authSubmitBtn" class="btn-primary">ログイン</button>
    
    <button id="googleLoginBtn" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
    <div class="toggle-link" id="authToggle">初めての方はこちら（新規登録）</div>
  </div>

  <div class="container" id="mainForm" style="display: none;">
    <h2>💸 支出入力</h2>
    <p id="userGreeting" style="text-align: center; color: #888; font-size: 12px; margin-top: -15px;"></p>
    
    <label>金額</label>
    <input type="number" id="amount" placeholder="例: 150" required>

    <label>カテゴリ</label>
    <select id="category">
      <option value="食費">食費</option>
      <option value="日用品">日用品</option>
      <option value="交通費">交通費</option>
      <option value="娯楽">娯楽</option>
      <option value="その他">その他</option>
    </select>

    <label>支払い方法</label>
    <div class="flex-row">
      <select id="paymentMethod" style="flex: 1; margin-top: 5px;">
        </select>
      <button type="button" id="addMethodBtn" class="btn-success">＋ 追加</button>
    </div>

    <label>メモ (任意)</label>
    <input type="text" id="memo" placeholder="例: コンビニコーヒー">

    <button id="submitBtn" class="btn-primary">記録する</button>
    <p id="message">保存しました！</p>
    <p style="text-align: center; margin-top: 20px;"><span id="logoutLink" style="color:#aaa; font-size:12px; cursor:pointer;">ログアウト</span></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // 💡 doc, setDoc, getDoc を新しく読み込む
    import { getFirestore, collection, addDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⚠️ ここは本物の config に書き換えてね！ ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let isSignUpMode = false;
    
    // 💡 デフォルトの支払い方法リスト
    const defaultMethods = ["現金", "EVERING", "クレジットカード", "郵カード", "Uカード", "住カード", "ぺいぺい"];
    let currentMethods = [];

    // プルダウンの選択肢を画面に描画する関数
    function renderMethods() {
      const select = document.getElementById("paymentMethod");
      select.innerHTML = "";
      currentMethods.forEach(method => {
        const opt = document.createElement("option");
        opt.value = method;
        opt.innerText = method;
        select.appendChild(opt);
      });
    }

    document.getElementById("authToggle").addEventListener("click", () => {
      isSignUpMode = !isSignUpMode;
      if (isSignUpMode) {
        document.getElementById("authTitle").innerText = "📝 新規アカウント登録";
        document.getElementById("authSubmitBtn").innerText = "新規登録";
        document.getElementById("authToggle").innerText = "既にアカウントをお持ちの方はこちら";
      } else {
        document.getElementById("authTitle").innerText = "🔒 家計簿ログイン";
        document.getElementById("authSubmitBtn").innerText = "ログイン";
        document.getElementById("authToggle").innerText = "初めての方はこちら（新規登録）";
      }
    });

    // 💡 ログイン状態の監視（ここでユーザー固有の支払い方法リストを読み込む）
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("mainForm").style.display = "block";
        document.getElementById("userGreeting").innerText = `${user.email} でログイン中`;

        // Firestoreから自分の設定データを取得
        const userRef = doc(db, "user_settings", user.uid);
        const snap = await getDoc(userRef);
        
        if (snap.exists() && snap.data().paymentMethods) {
          // 保存されているデータがあればそれを使う
          currentMethods = snap.data().paymentMethods;
        } else {
          // なければデフォルトをセットして保存する
          currentMethods = [...defaultMethods];
          await setDoc(userRef, { paymentMethods: currentMethods }, { merge: true });
        }
        renderMethods();

      } else {
        document.getElementById("authScreen").style.display = "block";
        document.getElementById("mainForm").style.display = "none";
      }
    });

    document.getElementById("authSubmitBtn").addEventListener("click", async () => {
      const email = document.getElementById("authEmail").value;
      const password = document.getElementById("authPassword").value;
      if (!email || !password) { alert("両方入力してね！"); return; }
      try {
        if (isSignUpMode) { await createUserWithEmailAndPassword(auth, email, password); alert("アカウントを作成したよ！"); }
        else { await signInWithEmailAndPassword(auth, email, password); }
      } catch (error) { alert(`エラー: ${error.message}`); }
    });

    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      try { await signInWithPopup(auth, provider); } catch (error) { alert("Googleログインに失敗しました"); }
    });

    document.getElementById("logoutLink").addEventListener("click", () => { signOut(auth); });

    // 💡 「＋ 追加」ボタンを押したときの処理
    document.getElementById("addMethodBtn").addEventListener("click", async () => {
      const newMethod = prompt("新しい支払い方法を入力してね！\n例: 楽天ペイ, Suica など");
      
      if (newMethod && newMethod.trim() !== "") {
        const trimmed = newMethod.trim();
        
        // まだリストにないかチェック
        if (!currentMethods.includes(trimmed)) {
          currentMethods.push(trimmed);
          renderMethods();
          
          // 今追加したやつを自動で選択状態にする
          document.getElementById("paymentMethod").value = trimmed;
          
          // Firestoreに保存して次回も使えるようにする
          const user = auth.currentUser;
          if (user) {
            await setDoc(doc(db, "user_settings", user.uid), {
              paymentMethods: currentMethods
            }, { merge: true });
          }
        } else {
          alert("その支払い方法はすでに登録されてるよ！");
        }
      }
    });

    // 支出データの送信処理
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const paymentMethod = document.getElementById("paymentMethod").value;
      const memo = document.getElementById("memo").value;

      if (!amount) { alert("金額を入力してね！"); return; }

      try {
        await addDoc(collection(db, "transactions"), {
          amount: Number(amount),
          category: category,
          type: "expense",
          paymentMethod: paymentMethod,
          memo: memo,
          date: new Date(),
          userId: auth.currentUser.uid 
        });

        document.getElementById("message").style.display = "block";
        document.getElementById("amount").value = "";
        document.getElementById("memo").value = "";
        setTimeout(() => { document.getElementById("message").style.display = "none"; }, 3000);
      } catch (error) {
        alert("保存に失敗しました。");
      }
    });
  </script>
</body>
</html>

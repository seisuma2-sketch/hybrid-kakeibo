<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ハイブリッド家計簿</title>
  <style>
    /* 🎨 テーマ変数の定義 */
    :root {
      --bg-color: #f4f7f6;
      --container-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #888888;
      --input-bg: #ffffff;
      --border-color: #cccccc;
      --accent-color: #007bff;
      --accent-text: #ffffff;
      --menu-bg: rgba(255, 255, 255, 0.95);
    }
    
    /* 🟩 サイバーネオンテーマ (黒×緑オンリー) */
    body.theme-cyber {
      --bg-color: #050505;
      --container-bg: #0a0a0a;
      --text-main: #00ff66;
      --text-sub: #008833;
      --input-bg: #000000;
      --border-color: #00ff66;
      --accent-color: #000000;
      --accent-text: #00ff66;
      --menu-bg: rgba(5, 5, 5, 0.95);
    }

    /* 🌊 ディープオーシャンテテーマ (深海ブルー) */
    body.theme-ocean {
      --bg-color: #020b14;
      --container-bg: #06192e;
      --text-main: #e0f7fa;
      --text-sub: #81d4fa;
      --input-bg: #011122;
      --border-color: #0288d1;
      --accent-color: #00b4d8;
      --accent-text: #020b14;
      --menu-bg: rgba(6, 25, 46, 0.95);
    }

    /* 共通スタイル */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 0; margin: 0; background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s ease, color 0.3s ease; }
    
    .app-header { display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
    .header-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
    
    /* 🍔 ハンバーガーメニューボタン */
    .menu-btn {
      position: absolute; left: 15px; top: 15px; z-index: 1001;
      background: none; border: none; cursor: pointer; padding: 5px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .menu-btn span { display: block; width: 25px; height: 3px; background-color: var(--text-main); border-radius: 3px; transition: 0.3s; }
    
    /* メニュー開いた時の✕印アニメーション */
    .menu-btn.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* 📱 フルスクリーンメニュー（サークルリビールアニメーション） */
    .fullscreen-menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--menu-bg); backdrop-filter: blur(10px);
      z-index: 1000;
      /* 魔法のアニメーション：左上を起点に円形に隠す/広げる */
      clip-path: circle(0px at 25px 25px);
      transition: clip-path 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .fullscreen-menu.open { clip-path: circle(150% at 25px 25px); }
    
    /* メニュー内の項目 */
    .menu-content { display: flex; flex-direction: column; gap: 30px; text-align: center; opacity: 0; transform: translateY(20px); transition: 0.3s; transition-delay: 0s; }
    .fullscreen-menu.open .menu-content { opacity: 1; transform: translateY(0); transition-delay: 0.3s; }
    .menu-item { background: none; border: none; color: var(--text-main); font-size: 20px; font-weight: bold; padding: 10px; cursor: pointer; }
    .theme-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
    .theme-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-color); cursor: pointer; }
    .theme-circle.t-default { background: #ffffff; border-color: #ccc; }
    .theme-circle.t-cyber { background: #000000; border-color: #00ff66; box-shadow: 0 0 10px #00ff66; }
    .theme-circle.t-ocean { background: #06192e; border-color: #00b4d8; }

    /* メインコンテナ */
    .container { padding: 20px; max-width: 400px; margin: 0 auto; }
    .card { background: var(--container-bg); padding: 25px 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 1px solid var(--border-color); }
    
    label { display: block; margin-top: 15px; font-weight: bold; color: var(--text-sub); font-size: 13px; }
    input, select {
      width: 100%; padding: 12px; margin-top: 5px; 
      background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color);
      border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
    
    .btn-primary {
      width: 100%; padding: 15px; margin-top: 25px;
      background-color: var(--accent-color); color: var(--accent-text);
      border: 1px solid var(--border-color); border-radius: 8px;
      font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.8; }
    
    /* サイバーテーマの時だけボタンを光らせる */
    body.theme-cyber .btn-primary { box-shadow: 0 0 15px rgba(0, 255, 102, 0.4); text-shadow: 0 0 5px #00ff66; }

    #message { text-align: center; margin-top: 15px; color: var(--accent-color); font-weight: bold; display: none; }
    .auth-box { text-align: center; margin-top: 40px; }
  </style>
</head>
<body class="theme-default">

  <div class="app-header" id="appHeader" style="display: none;">
    <button class="menu-btn" id="menuBtn">
      <span></span><span></span><span></span>
    </button>
    <div class="header-title">💸 HYBRID KAKEIBO</div>
  </div>

  <div class="fullscreen-menu" id="fullMenu">
    <div class="menu-content">
      <div>
        <p style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px;">テーマ変更</p>
        <div class="theme-buttons">
          <div class="theme-circle t-default" onclick="changeTheme('theme-default')"></div>
          <div class="theme-circle t-cyber" onclick="changeTheme('theme-cyber')"></div>
          <div class="theme-circle t-ocean" onclick="changeTheme('theme-ocean')"></div>
        </div>
      </div>
      <button class="menu-item" id="addMethodBtn">＋ 支払い方法を追加</button>
      <button class="menu-item" id="logoutLink" style="color: #ff3333;">ログアウト</button>
    </div>
  </div>

  <div class="container auth-box" id="authScreen">
    <h2 style="margin-bottom: 20px;">SYSTEM LOGIN</h2>
    <form id="authForm">
      <input type="email" id="authEmail" name="username" autocomplete="username" placeholder="メールアドレス" required>
      <input type="password" id="authPassword" name="password" autocomplete="current-password" placeholder="パスワード" required>
      <button type="submit" class="btn-primary" style="margin-top: 20px;">ログイン</button>
    </form>
    <p id="authToggle" style="margin-top: 20px; font-size: 14px; color: var(--text-sub); cursor: pointer; text-decoration: underline;">新規登録モードへ切り替え</p>
  </div>

  <div class="container" id="mainForm" style="display: none;">
    <div class="card">
      <label>金額</label>
      <input type="number" id="amount" placeholder="¥ 150" required>

      <label>カテゴリ</label>
      <select id="category">
        <option value="食費">食費</option>
        <option value="日用品">日用品</option>
        <option value="交通費">交通費</option>
        <option value="娯楽">娯楽</option>
        <option value="その他">その他</option>
      </select>

      <label>支払い方法</label>
      <select id="paymentMethod"></select>

      <label>メモ (任意)</label>
      <input type="text" id="memo" placeholder="コンビニコーヒー">

      <button id="submitBtn" class="btn-primary">記録する</button>
      <p id="message">保存完了！</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⚠️ ここは本物の config に書き換えてね！ ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let isSignUpMode = false;
    let currentMethods = ["現金", "EVERING", "クレジットカード", "郵カード", "Uカード", "住カード", "ぺいぺい"];

    // 🎨 テーマ管理機能
    // ページを読み込んだ時にローカルストレージからテーマを復元
    const savedTheme = localStorage.getItem('kakeibo-theme') || 'theme-default';
    document.body.className = savedTheme;

    // テーマ変更関数（HTMLのonclickから呼ばれるようにwindowに登録）
    window.changeTheme = function(themeName) {
      document.body.className = themeName;
      localStorage.setItem('kakeibo-theme', themeName);
      toggleMenu(); // テーマを変えたらメニューを閉じる
    };

    // 🍔 ハンバーガーメニューの開閉機能
    const menuBtn = document.getElementById('menuBtn');
    const fullMenu = document.getElementById('fullMenu');
    
    function toggleMenu() {
      menuBtn.classList.toggle('open');
      fullMenu.classList.toggle('open');
    }
    menuBtn.addEventListener('click', toggleMenu);

    // 支払い方法の描画
    function renderMethods() {
      const select = document.getElementById("paymentMethod");
      select.innerHTML = "";
      currentMethods.forEach(method => {
        const opt = document.createElement("option");
        opt.value = method;
        opt.innerText = method;
        select.appendChild(opt);
      });
    }

    // モード切り替え
    document.getElementById("authToggle").addEventListener("click", (e) => {
      isSignUpMode = !isSignUpMode;
      e.target.innerText = isSignUpMode ? "ログイン画面へ戻る" : "新規登録モードへ切り替え";
      document.querySelector("#authForm button").innerText = isSignUpMode ? "新規登録" : "ログイン";
    });

    // 認証状態の監視
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("mainForm").style.display = "block";
        document.getElementById("appHeader").style.display = "flex";

        const userRef = doc(db, "user_settings", user.uid);
        const snap = await getDoc(userRef);
        if (snap.exists() && snap.data().paymentMethods) {
          currentMethods = snap.data().paymentMethods;
        } else {
          await setDoc(userRef, { paymentMethods: currentMethods }, { merge: true });
        }
        renderMethods();
      } else {
        document.getElementById("authScreen").style.display = "block";
        document.getElementById("mainForm").style.display = "none";
        document.getElementById("appHeader").style.display = "none";
      }
    });

    // ログイン処理（パスキー対応のform submit）
    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("authEmail").value;
      const password = document.getElementById("authPassword").value;
      try {
        if (isSignUpMode) { await createUserWithEmailAndPassword(auth, email, password); } 
        else { await signInWithEmailAndPassword(auth, email, password); }
      } catch (error) { alert(`エラー: ${error.message}`); }
    });

    // ログアウト処理
    document.getElementById("logoutLink").addEventListener("click", () => {
      toggleMenu();
      signOut(auth);
    });

    // 支払い方法追加
    document.getElementById("addMethodBtn").addEventListener("click", async () => {
      toggleMenu(); // メニューを閉じてからプロンプトを出す
      setTimeout(async () => {
        const newMethod = prompt("新しい支払い方法を入力してね！\n例: Suica, 楽天ペイ");
        if (newMethod && newMethod.trim() !== "") {
          const trimmed = newMethod.trim();
          if (!currentMethods.includes(trimmed)) {
            currentMethods.push(trimmed);
            renderMethods();
            document.getElementById("paymentMethod").value = trimmed;
            const user = auth.currentUser;
            if (user) {
              await setDoc(doc(db, "user_settings", user.uid), { paymentMethods: currentMethods }, { merge: true });
            }
          } else { alert("すでに登録されてるよ！"); }
        }
      }, 300); // メニューが閉じるのを待つ
    });

    // データ送信処理
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const paymentMethod = document.getElementById("paymentMethod").value;
      const memo = document.getElementById("memo").value;

      if (!amount) { alert("金額を入力してね！"); return; }

      try {
        await addDoc(collection(db, "transactions"), {
          amount: Number(amount),
          category: category,
          type: "expense",
          paymentMethod: paymentMethod,
          memo: memo,
          date: new Date(),
          userId: auth.currentUser.uid 
        });

        document.getElementById("message").style.display = "block";
        document.getElementById("amount").value = "";
        document.getElementById("memo").value = "";
        setTimeout(() => { document.getElementById("message").style.display = "none"; }, 3000);
      } catch (error) { alert("保存に失敗しました。"); }
    });
  </script>
</body>
</html>

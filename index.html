<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハイブリッド家計簿</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 15px; margin-top: 25px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    button:active { background-color: #0056b3; }
    #message { text-align: center; margin-top: 15px; color: green; font-weight: bold; display: none; }
  </style>
</head>
<body>

  <div class="container">
    <h2>💸 支出入力</h2>
    
    <label>金額</label>
    <input type="number" id="amount" placeholder="例: 150" required>

    <label>カテゴリ</label>
    <select id="category">
      <option value="食費">食費</option>
      <option value="日用品">日用品</option>
      <option value="交通費">交通費</option>
      <option value="娯楽">娯楽</option>
      <option value="その他">その他</option>
    </select>

    <label>支払い方法</label>
    <select id="paymentMethod">
      <option value="現金">現金</option>
      <option value="EVERING">EVERING</option>
      <option value="クレジットカード">クレジットカード</option>
      <option value="郵カード">郵カード</option>
      <option value="Uカード">Uカード</option>
      <option value="住カード">住カード</option>
      <option value="ぺいぺい">ぺいぺい</option>
    </select>

    <label>メモ (任意)</label>
    <input type="text" id="memo" placeholder="例: コンビニコーヒー">

    <button id="submitBtn">記録する</button>
    <p id="message">保存しました！</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ⚠️ここにさっきコピーした firebaseConfig を貼り付ける！⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyB5UE_wkcBoBsaGo0warU40csxJAWi73-I",
  authDomain: "hybrid-kakeibo.firebaseapp.com",
  projectId: "hybrid-kakeibo",
  storageBucket: "hybrid-kakeibo.firebasestorage.app",
  messagingSenderId: "172145728222",
  appId: "1:172145728222:web:bf5c35f9764b5152b0c04f",
  measurementId: "G-5SV54CHL1W"
};

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 送信ボタンの処理
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const paymentMethod = document.getElementById("paymentMethod").value;
      const memo = document.getElementById("memo").value;

      if (!amount) {
        alert("金額を入力してね！");
        return;
      }

      try {
        // Firestoreの transactions コレクションにデータを追加
        await addDoc(collection(db, "transactions"), {
          amount: Number(amount),
          category: category,
          type: "expense", // 今回は支出入力画面として固定
          paymentMethod: paymentMethod,
          memo: memo,
          date: new Date() // 現在の日時
        });

        // 成功したらメッセージを表示して入力欄をリセット
        document.getElementById("message").style.display = "block";
        document.getElementById("amount").value = "";
        document.getElementById("memo").value = "";
        
        setTimeout(() => {
          document.getElementById("message").style.display = "none";
        }, 3000);

      } catch (error) {
        console.error("エラーが起きたよ: ", error);
        alert("保存に失敗しちゃった。コンソールを確認してね。");
      }
    });
  </script>
</body>
</html>
